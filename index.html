<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesak Lantern AR</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        /* Clean full-screen presentation */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0b0b;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* The viewport for the 3D lantern */
        model-viewer {
            width: 100vw;
            height: 100vh;
            --poster-color: transparent;
        }

        /* Button to trigger AR mode on your phone */
        #ar-button {
            background-color: #ff4a5a;
            color: white;
            border-radius: 30px;
            border: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 74, 90, 0.4);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
            z-index: 999;
        }

        #ar-button:active {
            background-color: #e03e4d;
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="lantern.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1.5"
        shadow-softness="1"
        exposure="1.3">
        
        <button slot="ar-button" id="ar-button">
            📳 VIEW IN YOUR ROOM (AR)
        </button>
        
    </model-viewer>

</body>
</html>
