<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vesak Lantern AR</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; 
            background-color: #0b0b0b;
            overflow: hidden;
            font-family: sans-serif;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        /* Keeps the button strictly on screen */
        #ar-button {
            background-color: #ff4a5a;
            color: white;
            border-radius: 30px;
            border: none;
            position: fixed; 
            bottom: 40px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 74, 90, 0.4);
            cursor: pointer;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="lantern.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="auto"
        camera-controls 
        shadow-intensity="1.5"
        exposure="1.3">
        
        <button slot="ar-button" id="ar-button">
            📳 VIEW IN YOUR ROOM
        </button>
        
    </model-viewer>

</body>
</html>
